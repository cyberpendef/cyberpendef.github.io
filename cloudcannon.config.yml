# CloudCannon Configuration for Hugo
paths:
  static: static
  uploads: static/uploads
  data: data
  layouts: layouts

ssg_name: hugo
timezone: Asia/Calcutta

# Automatic URL Matching for Hugo
collections_config:
  pages:
    name: Website Pages
    path: content
    output: true
    # This pattern matches Hugo's default URL structure:
    # content/about/_index.md -> /about/
    # content/_index.md -> /
    url: "/[relative_base_path]/"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - content

# Markdown Parser Settings
markdown:
  engine: commonmark
  options:
    gfm: true
    linkify: false
    table: false
    strikethrough: false
    subscript: false
    superscript: false
    heading_ids: false
    breaks: false
    xhtml: false
    attributes: false
    typographer: false
    treat_indentation_as_code: true
