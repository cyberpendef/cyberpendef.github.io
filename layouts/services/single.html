{{ define "main" }}
<div style="padding-top: 5rem; padding-bottom: 5rem;">
    <div style="max-width: 80rem; margin: 0 auto; padding: 0 2rem;">
        {{ .Content }}
    </div>
</div>

<script>
(function() {
    function initializeAccordion() {
        const serviceCards = document.querySelectorAll('.service-card');
        
        if (serviceCards.length === 0) {
            console.warn('No service cards found');
            return;
        }
        
        serviceCards.forEach(card => {
            const header = card.querySelector('.service-header');
            
            if (header) {
                header.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // Close other cards
                    serviceCards.forEach(otherCard => {
                        if (otherCard !== card) {
                            otherCard.classList.remove('active');
                        }
                    });
                    
                    // Toggle this card
                    card.classList.toggle('active');
                });
            }
        });
    }
    
    // Try multiple approaches to ensure the script runs
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeAccordion);
    } else {
        // DOM is already ready
        initializeAccordion();
    }
    
    // Also try after a brief delay to catch any async loading
    setTimeout(initializeAccordion, 100);
})();
</script>
{{ end }}
