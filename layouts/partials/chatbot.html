<div id="cyber-chat-widget" class="cyber-chat-minimized">
    <!-- Floating Toggle Button -->
    <button id="chat-toggle" class="chat-glow-button" aria-label="Open Security Assistant">
        <div class="chat-icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a10 10 0 0 1 10 10 10 10 0 0 1-10 10 10 10 0 0 1-10-10 10 10 0 0 1 10-10zM12 8v4M12 16h.01" />
            </svg>
        </div>
        <span class="chat-label">Security AI</span>
    </button>

    <!-- Chat Window -->
    <div id="chat-window" class="chat-window-hidden">
        <div class="chat-header">
            <div class="header-info">
                <div class="online-indicator"></div>
                <div>
                    <div class="bot-name">Cybernet Assistant</div>
                    <div class="bot-status">Secure Connection Active</div>
                </div>
            </div>
            <button id="chat-close" aria-label="Close Chat">&times;</button>
        </div>

        <div id="chat-messages" class="chat-body">
            <div class="message bot-message">
                <div class="message-content">
                    Greetings. I am the CyberPenDef AI Assistant. How can I assist with your security posture today?
                </div>
                <div class="message-time">System Initialized</div>
            </div>
        </div>

        <div class="chat-footer">
            <div id="chat-turnstile-container" style="display: none; margin-bottom: 10px;">
                <div class="cf-turnstile" data-sitekey="{{ .Site.Params.turnstile_site_key }}" data-theme="dark" data-size="compact"></div>
            </div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Query the system..." autocomplete="off">
                <button type="submit" id="chat-send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                    </svg>
                </button>
            </form>
            <div class="chat-attribution">AI powered by Llama 3.3 · Secure Channel</div>
        </div>
    </div>
</div>

<style>
    :root {
        --chat-bg: #0a0f18;
        --chat-border: #1e293b;
        --chat-accent: #00d4ff;
        --chat-text: #e2e8f0;
        --chat-bot-msg: rgba(0, 212, 255, 0.05);
        --chat-user-msg: rgba(255, 255, 255, 0.03);
    }

    #cyber-chat-widget {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 1000;
        font-family: 'JetBrains Mono', monospace;
    }

    /* Floating Button */
    .chat-glow-button {
        background: var(--chat-bg);
        border: 1px solid var(--chat-accent);
        color: var(--chat-accent);
        padding: 12px 20px;
        border-radius: 50px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .chat-glow-button:hover {
        box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
        transform: translateY(-3px);
    }

    .chat-icon-container {
        width: 24px;
        height: 24px;
        animation: chat-pulse 2s infinite;
    }

    @keyframes chat-pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
        100% { transform: scale(1); opacity: 1; }
    }

    .chat-label {
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.85rem;
    }

    /* Chat Window */
    #chat-window {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 380px;
        height: 550px;
        background: var(--chat-bg);
        border: 1px solid var(--chat-border);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        transition: all 0.3s ease;
        transform-origin: bottom right;
    }

    .chat-window-hidden {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
        pointer-events: none;
    }

    /* Header */
    .chat-header {
        background: rgba(30, 41, 59, 0.5);
        padding: 20px;
        border-bottom: 1px solid var(--chat-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header-info {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .online-indicator {
        width: 10px;
        height: 10px;
        background: #00ff9d;
        border-radius: 50%;
        box-shadow: 0 0 10px #00ff9d;
    }

    .bot-name {
        color: white;
        font-weight: 700;
        font-size: 0.95rem;
    }

    .bot-status {
        color: #94a3b8;
        font-size: 0.7rem;
        text-transform: uppercase;
    }

    #chat-close {
        background: none;
        border: none;
        color: #94a3b8;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 5px;
    }

    /* Body */
    .chat-body {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
        scrollbar-width: thin;
        scrollbar-color: var(--chat-border) transparent;
    }

    .message {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.9rem;
        line-height: 1.5;
    }

    .bot-message {
        align-self: flex-start;
        background: var(--chat-bot-msg);
        border: 1px solid rgba(0, 212, 255, 0.1);
        color: var(--chat-text);
        border-bottom-left-radius: 2px;
    }

    .user-message {
        align-self: flex-end;
        background: var(--chat-user-msg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-bottom-right-radius: 2px;
    }

    .message-time {
        font-size: 0.65rem;
        color: #64748b;
        margin-top: 5px;
    }

    /* Footer */
    .chat-footer {
        padding: 20px;
        border-top: 1px solid var(--chat-border);
        background: rgba(30, 41, 59, 0.2);
    }

    #chat-form {
        display: flex;
        gap: 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--chat-border);
        padding: 8px 12px;
        border-radius: 8px;
    }

    #chat-input {
        flex: 1;
        background: none;
        border: none;
        color: white;
        font-family: inherit;
        font-size: 0.9rem;
    }

    #chat-input:focus { outline: none; }

    #chat-send {
        background: none;
        border: none;
        color: var(--chat-accent);
        cursor: pointer;
        padding: 5px;
        display: flex;
        align-items: center;
        transition: transform 0.2s;
    }

    #chat-send:hover { transform: scale(1.1); }
    #chat-send svg { width: 20px; height: 20px; }

    .chat-attribution {
        font-size: 0.6rem;
        color: #475569;
        text-align: center;
        margin-top: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 480px) {
        #chat-window {
            width: calc(100vw - 40px);
            height: 450px;
            right: -10px;
        }
        #cyber-chat-widget {
            right: 20px;
            bottom: 20px;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatWidget = document.getElementById('cyber-chat-widget');
        const chatToggle = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const chatClose = document.getElementById('chat-close');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        const turnstileContainer = document.getElementById('chat-turnstile-container');

        const SUPABASE_FUNC_URL = 'https://qfkdrluonrhmubqyeyex.supabase.co/functions/v1/ai-assistant';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFma2RybHVvbnJobXVicXlleWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDk4MjcsImV4cCI6MjA5MTAyNTgyN30.YKXk70kUibQJNhG-AIwyGLChl_mta-lqm-Sm27N41os';

        // Toggle Chat
        chatToggle.addEventListener('click', () => {
            chatWindow.classList.toggle('chat-window-hidden');
            if (!chatWindow.classList.contains('chat-window-hidden')) {
                chatInput.focus();
                // Reset turnstile if visible
                if (typeof turnstile !== 'undefined') turnstile.reset();
            }
        });

        chatClose.addEventListener('click', () => {
            chatWindow.classList.add('chat-window-hidden');
        });

        // Add Message to UI
        function addMessage(content, isBot = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isBot ? 'bot-message' : 'user-message'}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            msgDiv.innerHTML = `
                <div class="message-content">${content}</div>
                <div class="message-time">${isBot ? 'System' : 'Client'} · ${time}</div>
            `;
            
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        // Handle Form
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = chatInput.value.trim();
            if (!query) return;

            // Add User Message
            addMessage(query, false);
            chatInput.value = '';
            chatInput.disabled = true;

            // Show Loading State
            const loadingMsg = addMessage('<span class="typing-dots">Analyzing query...</span>', true);
            
            // Turnstile Check (Backend requires it if configured)
            const turnstileResponse = document.querySelector('#chat-turnstile-container [name="cf-turnstile-response"]');
            
            try {
                const response = await fetch(SUPABASE_FUNC_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        message: query,
                        'cf-turnstile-response': turnstileResponse ? turnstileResponse.value : null
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    if (data.error && data.error.includes('verification')) {
                        turnstileContainer.style.display = 'block';
                        throw new Error("Security verification required. Please complete the CAPTCHA above.");
                    }
                    throw new Error(data.error || "System connection interrupted.");
                }

                // Remove loading dots and add bot response
                loadingMsg.remove();
                addMessage(data.response, true);

            } catch (error) {
                loadingMsg.innerHTML = `<div style="color: #ff4444;">⚠️ ${error.message}</div>`;
            } finally {
                chatInput.disabled = false;
                chatInput.focus();
                if (typeof turnstile !== 'undefined') turnstile.reset();
            }
        });
    });
</script>
