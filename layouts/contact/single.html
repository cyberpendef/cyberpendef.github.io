{{ define "main" }}
<div style="padding-top: 5rem; padding-bottom: 5rem;">
    <div style="max-width: 80rem; margin: 0 auto; padding: 0 2rem;">
        <div style="margin-bottom: 4rem; text-align: center;">
            <h1 style="font-size: 3rem; font-weight: bold; margin-bottom: 1rem; color: white;">{{ .Title }}</h1>
            <div style="width: 5rem; height: 0.25rem; background: linear-gradient(135deg, #1e40af 0%, #0891b2 50%, #d946ef 100%); margin: 0 auto;"></div>
            {{ if .Params.description }}<p style="font-size: 1.25rem; color: #d1d5db; margin-top: 1.5rem;">{{ .Params.description }}</p>{{ end }}
        </div>

        {{ .Content }}
    </div>
</div>
{{ end }}
