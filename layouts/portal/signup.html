{{ define "main" }}

<div class="page-hero stagger-in">
    <div class="hero-badge"><span class="dot" style="background: var(--cyan);"></span> New Client Registration</div>
    <h1 class="hero-title">Create <span>Account</span></h1>
    <p class="lead">
        Register to access your secure dashboard, track service tickets, and download security reports.
    </p>
</div>

<div class="stagger-in delay-1" style="max-width: 500px; margin: 40px auto 100px;">
    <div id="authContainer" style="background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px;">
        
        <h2 style="font-family: var(--font-mono); font-size: 1.5rem; color: var(--cyan); margin-bottom: 30px; text-align: center; text-transform: uppercase; letter-spacing: 2px;">Client Registration</h2>

        <form id="authForm">
            <!-- Full Name -->
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" style="display: block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase;">Full Name</label>
                <input type="text" id="fullname" class="form-input" placeholder="John Doe" required style="width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: var(--font-body);">
            </div>

            <!-- Username -->
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" style="display: block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase;">Username</label>
                <input type="text" id="username" class="form-input" placeholder="johndoe_cyber" required style="width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: var(--font-body);">
            </div>

            <!-- Email Address -->
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" style="display: block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase;">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="client@example.com" required style="width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: var(--font-body);">
            </div>
            
            <!-- Password -->
            <div class="form-group" style="margin-bottom: 24px;">
                <label class="form-label" style="display: block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase;">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required style="width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: var(--font-body);">
            </div>

            <!-- Cloudflare Turnstile Widget -->
            <div class="cf-turnstile" data-sitekey="{{ .Site.Params.turnstile_site_key }}" data-theme="dark" style="margin-bottom: 20px; display: flex; justify-content: center;"></div>

            <button type="submit" id="authBtn" class="btn btn-primary" style="width: 100%; padding: 18px; font-weight: 700;">Sign Up & Verify Email</button>
        </form>

        <div style="margin-top: 25px; text-align: center; font-family: var(--font-mono); font-size: 0.85rem;">
            <span style="color: var(--muted);">Already have an account?</span> 
            <a href="/portal" style="color: var(--cyan); text-decoration: none; border-bottom: 1px dashed var(--cyan); margin-left: 5px;">Log in here</a>
        </div>

        <div id="authFeedback" style="margin-top: 25px; padding: 15px; border-radius: var(--radius); display: none; text-align: center;"></div>
        
    </div>
</div>

<!-- Turnstile SDK -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = 'https://qfkdrluonrhmubqyeyex.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFma2RybHVvbnJobXVicXlleWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDk4MjcsImV4cCI6MjA5MTAyNTgyN30.YKXk70kUibQJNhG-AIwyGLChl_mta-lqm-Sm27N41os';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authBtn = document.getElementById('authBtn');
    const authForm = document.getElementById('authForm');
    const feedback = document.getElementById('authFeedback');

    authForm.addEventListener('submit', async (e) => {
        console.log("Signup form submitted");
        e.preventDefault(); 
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullNameValue = document.getElementById('fullname').value;
        const usernameValue = document.getElementById('username').value;
        
        console.log("Attempting signup for:", email);

        // Frontend Turnstile Check
        const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]');
        if (!turnstileResponse || !turnstileResponse.value) {
            console.warn("Turnstile check failed or not completed.");
            feedback.style.display = 'block';
            feedback.style.backgroundColor = 'rgba(255, 184, 0, 0.1)';
            feedback.style.border = '1px solid rgba(255, 184, 0, 0.3)';
            feedback.style.color = 'var(--amber)';
            feedback.innerHTML = '⚠️ Please complete the security check.';
            return;
        }

        authBtn.disabled = true;
        authBtn.innerText = 'Processing...';
        feedback.style.display = 'none';

        try {
            console.log("Calling supabaseClient.auth.signUp...");
            // Sign Up
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: { 
                    data: { 
                        full_name: fullNameValue,
                        username: usernameValue
                    },
                    captchaToken: turnstileResponse.value,
                    emailRedirectTo: window.location.origin + '/portal/dashboard'
                }
            });

            if (error) {
                console.error("Supabase signUp error:", error);
                throw error;
            }

            console.log("Signup successful, data:", data);

            // Successful Signup -> Prompt for Email Verification
            feedback.style.display = 'block';
            feedback.style.backgroundColor = 'rgba(0, 212, 255, 0.1)';
            feedback.style.border = '1px solid rgba(0, 212, 255, 0.3)';
            feedback.style.color = 'var(--cyan)';
            feedback.innerHTML = '✨ <strong>Registration Successful!</strong><br>A confirmation link has been sent to your email. Please verify your email before logging in.';
            authForm.reset();
            if (typeof turnstile !== 'undefined') {
                turnstile.reset();
            }

        } catch (error) {
            console.error("Caught Auth Error: ", error);
            feedback.style.display = 'block';
            feedback.style.backgroundColor = 'rgba(255, 68, 68, 0.1)';
            feedback.style.border = '1px solid rgba(255, 68, 68, 0.3)';
            feedback.style.color = '#ff4444';
            feedback.innerHTML = `❌ <strong>Error:</strong> ${error.message || 'An unexpected error occurred.'}`;
            if (typeof turnstile !== 'undefined') {
                turnstile.reset();
            }
        } finally {
            authBtn.disabled = false;
            authBtn.innerText = 'Sign Up & Verify Email';
        }
    });

    // Automatically check if user is already logged in
    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            window.location.href = '/portal/dashboard';
        }
    }
    
    checkSession();
</script>

{{ end }}
