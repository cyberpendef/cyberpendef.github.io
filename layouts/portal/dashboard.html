{{ define "main" }}
<!-- STRICT ROUTE PROTECTION: Execute immediately before rendering -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Keep deployment-specific Supabase values in Hugo config so every portal page stays aligned.
    const SUPABASE_URL = {{ printf "%q" .Site.Params.supabase_url | safeJS }};
    const SUPABASE_ANON_KEY = {{ printf "%q" .Site.Params.supabase_anon_key | safeJS }};
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Hide HTML document to prevent UI flashing before check completes
    document.documentElement.style.display = 'none';

    // Run the dashboard setup immediately if the DOM is already parsed, otherwise wait once.
    function initializeDashboard(session) {
        const renderDashboard = () => {
            document.getElementById('userEmail').innerText = session.user.email;
            fetchTickets();
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderDashboard, { once: true });
        } else {
            renderDashboard();
        }
    }

    // Synchronous-like check to prevent unauthenticated access
    async function enforceProtection() {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        if (!session || error) {
            // Kick them out to the login page immediately
            window.location.replace('/portal'); 
        } else {
            // Show page
            document.documentElement.style.display = 'block'; 
            initializeDashboard(session);
        }
    }
    
    enforceProtection();
</script>

<div class="page-hero stagger-in" style="padding-bottom: 40px;">
    <div class="hero-badge"><span class="dot" style="background: var(--green);"></span> Authenticated Session</div>
    <h1 class="hero-title">Client <span>Dashboard</span></h1>
    <p class="lead">Welcome back, <strong id="userEmail" style="color: var(--cyan);">Loading...</strong></p>
    <button onclick="logout()" class="btn" style="border: 1px solid #ff4444; color: #ff4444; background: transparent; padding: 10px 20px; margin-top: 20px; cursor: pointer; border-radius: 8px; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Secure Logout</button>
</div>

<div class="container stagger-in delay-1" style="max-width: 1000px; margin-bottom: 100px;">
    <div style="background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px;">
            <h2 style="color: var(--white); margin: 0; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; font-size: 1.25rem;">Active Service Tickets</h2>
            <div id="ticketCount" style="background: rgba(0, 212, 255, 0.1); color: var(--cyan); padding: 4px 12px; border-radius: 20px; font-family: var(--font-mono); font-size: 0.8rem; border: 1px solid rgba(0, 212, 255, 0.3);">
                0 Tickets
            </div>
        </div>
        
        <div id="ticketsGrid" style="display: grid; grid-template-columns: 1fr; gap: 20px;">
            <!-- Tickets will be injected here -->
            <div id="loadingState" style="text-align: center; padding: 40px;">
                <div style="color: var(--cyan); font-family: var(--font-mono); margin-bottom: 10px;">Establishing secure connection...</div>
                <div style="width: 100%; height: 2px; background: var(--border); position: relative; overflow: hidden;">
                    <div style="position: absolute; width: 30%; height: 100%; background: var(--cyan); animation: loading-slide 1.5s infinite ease-in-out;"></div>
                </div>
            </div>
        </div>

        <div id="emptyState" style="display: none; text-align: center; padding: 60px 20px;">
            <div style="font-size: 3rem; margin-bottom: 20px;">📂</div>
            <h3 style="color: var(--white); margin-bottom: 10px;">No Active Tickets Found</h3>
            <p style="color: var(--muted); max-width: 400px; margin: 0 auto;">You don't have any active service tickets or security assessments at this time.</p>
            <a href="/contact" class="btn btn-primary" style="margin-top: 30px; display: inline-block;">Request New Service</a>
        </div>
    </div>
</div>

<style>
    @keyframes loading-slide {
        0% { left: -30%; }
        100% { left: 100%; }
    }

    .ticket-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .ticket-card:hover {
        border-color: var(--cyan);
        background: rgba(0, 212, 255, 0.03);
        transform: translateY(-2px);
    }

    .status-badge {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 4px;
        letter-spacing: 1px;
        font-weight: 700;
    }

    .status-pending { background: rgba(255, 184, 0, 0.1); color: var(--amber); border: 1px solid rgba(255, 184, 0, 0.3); }
    .status-in_progress { background: rgba(0, 212, 255, 0.1); color: var(--cyan); border: 1px solid rgba(0, 212, 255, 0.3); }
    .status-completed { background: rgba(0, 255, 157, 0.1); color: var(--green); border: 1px solid rgba(0, 255, 157, 0.3); }
</style>

<script>
    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.replace('/portal');
    }

    async function fetchTickets() {
        const grid = document.getElementById('ticketsGrid');
        const emptyState = document.getElementById('emptyState');
        const countBadge = document.getElementById('ticketCount');
        const loadingState = document.getElementById('loadingState');

        try {
            // RLS automatically filters this to ONLY the current user's tickets
            const { data: tickets, error } = await supabaseClient
                .from('service_tickets')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            loadingState.style.display = 'none';

            if (!tickets || tickets.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                countBadge.innerText = '0 Tickets';
                return;
            }

            countBadge.innerText = `${tickets.length} Ticket${tickets.length > 1 ? 's' : ''}`;
            
            grid.innerHTML = tickets.map(ticket => `
                <div class="ticket-card">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                        <div>
                            <span class="status-badge status-${ticket.status.replace(' ', '_')}">${ticket.status}</span>
                            <h3 style="color: var(--white); margin: 10px 0 5px 0; font-size: 1.1rem;">${ticket.title}</h3>
                            <div style="color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem;">
                                ID: ${ticket.id.substring(0, 8)}... · ${new Date(ticket.created_at).toLocaleDateString()}
                            </div>
                        </div>
                        ${ticket.report_url ? `
                            <a href="${ticket.report_url}" target="_blank" class="btn" style="padding: 6px 12px; font-size: 0.8rem; border: 1px solid var(--cyan); color: var(--cyan); background: transparent;">View Report</a>
                        ` : ''}
                    </div>
                    <p style="color: var(--muted); font-size: 0.9rem; margin: 0; line-height: 1.6;">${ticket.description || 'No description provided.'}</p>
                </div>
            `).join('');

        } catch (error) {
            console.error("Fetch Error:", error);
            loadingState.style.display = 'none';
            grid.innerHTML = `
                <div style="padding: 30px; background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.3); color: #ff4444; border-radius: 8px; text-align: center;">
                    <strong>Encryption Error:</strong> Failed to retrieve secure ticket data. Please try again later.
                </div>
            `;
        }
    }
</script>
{{ end }}
