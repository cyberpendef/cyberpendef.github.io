{{ define "main" }}
<!-- STRICT ROUTE PROTECTION: Execute immediately before rendering -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qfkdrluonrhmubqyeyex.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFma2RybHVvbnJobXVicXlleWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDk4MjcsImV4cCI6MjA5MTAyNTgyN30.YKXk70kUibQJNhG-AIwyGLChl_mta-lqm-Sm27N41os';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Hide HTML document to prevent UI flashing before check completes
    document.documentElement.style.display = 'none';

    // Synchronous-like check to prevent unauthenticated access
    async function enforceProtection() {
        const { data: { session }, error } = await supabase.auth.getSession();
        if (!session || error) {
            // Kick them out to the login page immediately
            window.location.replace('/portal'); 
        } else {
            // Show page
            document.documentElement.style.display = 'block'; 
            // Wait for DOM to be ready
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('userEmail').innerText = session.user.email;
            });
        }
    }
    
    enforceProtection();
</script>

<div class="page-hero stagger-in" style="padding-bottom: 40px;">
    <div class="hero-badge"><span class="dot" style="background: var(--green);"></span> Authenticated Session</div>
    <h1 class="hero-title">Client <span>Dashboard</span></h1>
    <p class="lead">Welcome back, <strong id="userEmail" style="color: var(--cyan);">Loading...</strong></p>
    <button onclick="logout()" class="btn" style="border: 1px solid #ff4444; color: #ff4444; background: transparent; padding: 10px 20px; margin-top: 20px; cursor: pointer; border-radius: 8px;">Secure Logout</button>
</div>

<div class="container stagger-in delay-1" style="max-width: 900px; margin-bottom: 100px;">
    <div style="background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; text-align: center;">
        <h2 style="color: var(--white); margin-bottom: 20px;">Your Active Tickets</h2>
        <p style="color: var(--muted);">Data fetching logic will be implemented here...</p>
    </div>
</div>

<script>
    async function logout() {
        await supabase.auth.signOut();
        window.location.replace('/portal');
    }
</script>
{{ end }}
