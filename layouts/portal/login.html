{{ define "main" }}

<div class="page-hero stagger-in">
    <div class="hero-badge"><span class="dot" style="background: var(--cyan);"></span> Client-Only Access</div>
    <h1 class="hero-title">Secure <span>Portal</span></h1>
    <p class="lead">
        Log in or create an account to securely access your service tickets and reports.
    </p>
</div>

<div class="stagger-in delay-1" style="max-width: 500px; margin: 40px auto 100px;">
    <div id="authContainer" style="background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px;">
        
        <!-- Tabs -->
        <div style="display: flex; margin-bottom: 30px; border-bottom: 1px solid var(--border);">
            <button id="tabLogin" style="flex: 1; padding: 15px; background: none; border: none; color: var(--cyan); border-bottom: 2px solid var(--cyan); font-family: var(--font-mono); cursor: pointer; font-size: 1rem;">Log In</button>
            <button id="tabSignup" style="flex: 1; padding: 15px; background: none; border: none; color: var(--muted); border-bottom: 2px solid transparent; font-family: var(--font-mono); cursor: pointer; font-size: 1rem;">Sign Up</button>
        </div>

        <form id="authForm">
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" style="display: block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase;">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="client@example.com" required style="width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: var(--font-body);">
            </div>
            
            <div class="form-group" style="margin-bottom: 24px;">
                <label class="form-label" style="display: block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase;">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required style="width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: var(--font-body);">
            </div>

            <!-- Cloudflare Turnstile Widget -->
            <div class="cf-turnstile" data-sitekey="0x4AAAAAAC1OBXLHWUcaUlZ0" data-theme="dark" style="margin-bottom: 20px; display: flex; justify-content: center;"></div>

            <button type="submit" id="authBtn" class="btn btn-primary" style="width: 100%; padding: 18px; font-weight: 700;">Log In</button>
        </form>

        <div id="authFeedback" style="margin-top: 25px; padding: 15px; border-radius: var(--radius); display: none; text-align: center;"></div>
        
    </div>
</div>

<!-- Turnstile SDK -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = 'https://qfkdrluonrhmubqyeyex.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFma2RybHVvbnJobXVicXlleWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDk4MjcsImV4cCI6MjA5MTAyNTgyN30.YKXk70kUibQJNhG-AIwyGLChl_mta-lqm-Sm27N41os';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isLoginMode = true;
    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');
    const authBtn = document.getElementById('authBtn');
    const authForm = document.getElementById('authForm');
    const feedback = document.getElementById('authFeedback');

    // Tab Switching Logic
    tabSignup.addEventListener('click', () => {
        isLoginMode = false;
        tabSignup.style.color = 'var(--cyan)';
        tabSignup.style.borderBottom = '2px solid var(--cyan)';
        tabLogin.style.color = 'var(--muted)';
        tabLogin.style.borderBottom = '2px solid transparent';
        authBtn.innerText = 'Sign Up & Verify Email';
        feedback.style.display = 'none';
    });

    tabLogin.addEventListener('click', () => {
        isLoginMode = true;
        tabLogin.style.color = 'var(--cyan)';
        tabLogin.style.borderBottom = '2px solid var(--cyan)';
        tabSignup.style.color = 'var(--muted)';
        tabSignup.style.borderBottom = '2px solid transparent';
        authBtn.innerText = 'Log In';
        feedback.style.display = 'none';
    });

    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Frontend Turnstile Check
        const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]');
        if (!turnstileResponse || !turnstileResponse.value) {
            feedback.style.display = 'block';
            feedback.style.backgroundColor = 'rgba(255, 184, 0, 0.1)';
            feedback.style.border = '1px solid rgba(255, 184, 0, 0.3)';
            feedback.style.color = 'var(--amber)';
            feedback.innerHTML = '⚠️ Please complete the security check.';
            return;
        }

        authBtn.disabled = true;
        authBtn.innerText = 'Processing...';
        feedback.style.display = 'none';

        try {
            let result;
            if (isLoginMode) {
                // Log In
                result = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                    options: { captchaToken: turnstileResponse.value } 
                });
            } else {
                // Sign Up
                result = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { 
                        captchaToken: turnstileResponse.value,
                        emailRedirectTo: window.location.origin + '/portal/dashboard'
                    }
                });
            }

            if (result.error) throw result.error;

            if (isLoginMode) {
                // Successful Login -> Redirect to Dashboard instantly
                window.location.href = '/portal/dashboard';
            } else {
                // Successful Signup -> Prompt for Email Verification
                feedback.style.display = 'block';
                feedback.style.backgroundColor = 'rgba(0, 212, 255, 0.1)';
                feedback.style.border = '1px solid rgba(0, 212, 255, 0.3)';
                feedback.style.color = 'var(--cyan)';
                feedback.innerHTML = '✨ <strong>Registration Successful!</strong><br>A confirmation link has been sent to your email. Please verify your email before logging in.';
                authForm.reset();
                turnstile.reset();
            }

        } catch (error) {
            feedback.style.display = 'block';
            feedback.style.backgroundColor = 'rgba(255, 68, 68, 0.1)';
            feedback.style.border = '1px solid rgba(255, 68, 68, 0.3)';
            feedback.style.color = '#ff4444';
            feedback.innerHTML = `❌ <strong>Error:</strong> ${error.message}`;
            turnstile.reset();
        } finally {
            authBtn.disabled = false;
            authBtn.innerText = isLoginMode ? 'Log In' : 'Sign Up & Verify Email';
        }
    });

    // Automatically check if user is already logged in
    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            window.location.href = '/portal/dashboard';
        }
    }
    
    // Listen for Auth State Changes (important for when user clicks email confirmation link)
    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) {
            window.location.href = '/portal/dashboard';
        }
    });

    checkSession();
</script>

{{ end }}
